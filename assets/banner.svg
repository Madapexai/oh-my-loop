<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1419"/>
      <stop offset="50%" style="stop-color:#1a2332"/>
      <stop offset="100%" style="stop-color:#0f1419"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#f093fb;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#4facfe;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>

  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <g transform="translate(900, 100)" opacity="0.2">
    <circle cx="100" cy="100" r="90" fill="none" stroke="#f093fb" stroke-width="2" stroke-dasharray="14 7"/>
    <circle cx="100" cy="100" r="60" fill="none" stroke="#4facfe" stroke-width="2" stroke-dasharray="12 6"/>
    <circle cx="100" cy="100" r="30" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
    <circle cx="100" cy="100" r="10" fill="url(#accent)"/>
    <circle cx="100" cy="10" r="6" fill="#f5576c"/>
    <circle cx="100" cy="190" r="6" fill="#4facfe"/>
    <circle cx="190" cy="100" r="6" fill="#00f2fe"/>
    <circle cx="10" cy="100" r="6" fill="#f093fb"/>
  </g>

  <line x1="80" y1="120" x2="1120" y2="120" stroke="url(#lineGrad)" stroke-width="1"/>
  <line x1="80" y1="320" x2="1120" y2="320" stroke="url(#lineGrad)" stroke-width="1"/>

  <text x="80" y="185" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="56" font-weight="700" fill="#ffffff" letter-spacing="-1">
    oh-my-loop
  </text>

  <text x="80" y="230" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="500">
    <tspan fill="#f093fb">Self-evolving</tspan>
    <tspan fill="#ffffff"> AI Agent Skill Framework</tspan>
  </text>

  <line x1="80" y1="260" x2="220" y2="260" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>

  <text x="80" y="295" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="400" fill="#90a4ae" letter-spacing="0.5">
    Core engine + application layer · Built-in self-learning
  </text>

  <text x="80" y="360" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="400" fill="#546e7a">
    The self-evolving AI agent skill collection that runs in a loop.
  </text>

  <text x="1120" y="360" font-family="monospace" font-size="13" fill="#455a64" text-anchor="end">
    Madapexai/oh-my-loop
  </text>
</svg>
