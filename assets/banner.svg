<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1419"/>
      <stop offset="50%" style="stop-color:#1a2332"/>
      <stop offset="100%" style="stop-color:#0f1419"/>
    </linearGradient>
    <linearGradient id="accent4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="accent4b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="400" fill="url(#bg4)"/>
  
  <g transform="translate(950, 200)" opacity="0.5">
    <circle r="100" fill="none" stroke="url(#accent4)" stroke-width="2" stroke-dasharray="20 10"/>
    <circle r="70" fill="none" stroke="url(#accent4b)" stroke-width="2" stroke-dasharray="15 8"/>
    <circle r="40" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    <circle r="12" fill="url(#accent4)"/>
    
    <g style="animation: spin 10s linear infinite; transform-origin: center;">
      <circle cx="70" cy="0" r="6" fill="#4facfe"/>
      <circle cx="-70" cy="0" r="6" fill="#f093fb"/>
      <circle cx="0" cy="70" r="5" fill="#f5576c"/>
      <circle cx="0" cy="-70" r="5" fill="#00f2fe"/>
    </g>
  </g>
  
  <g opacity="0.15">
    <rect x="100" y="80" width="200" height="3" rx="1.5" fill="url(#accent4)"/>
    <rect x="100" y="100" width="150" height="3" rx="1.5" fill="url(#accent4b)"/>
    <rect x="100" y="120" width="180" height="3" rx="1.5" fill="url(#accent4)"/>
    <rect x="100" y="140" width="120" height="3" rx="1.5" fill="url(#accent4b)"/>
  </g>
  
  <text x="60" y="180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="56" font-weight="bold" fill="#ffffff" filter="url(#glow4)">
    🔧 oh-my-loop
  </text>
  <text x="60" y="230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="500">
    <tspan fill="#f093fb">自进化</tspan>
    <tspan fill="#ffffff"> 的 AI Agent 技能框架</tspan>
  </text>
  <text x="60" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#8090a0">
    核心引擎 + 应用层 · 自带自学习能力
  </text>
  
  <line x1="60" y1="300" x2="320" y2="300" stroke="url(#accent4)" stroke-width="3" stroke-linecap="round"/>
  
  <text x="60" y="340" font-family="monospace" font-size="14" fill="#506070">
    The self-evolving AI agent skill collection
  </text>
  <text x="60" y="365" font-family="monospace" font-size="14" fill="#506070">
    that runs in a loop.
  </text>
  
  <text x="1140" y="380" font-family="monospace" font-size="14" fill="#304050" text-anchor="end">
    oh-my-loop
  </text>
</svg>
