name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  cli:
    strategy:
      matrix:
        node-version: [18, 22]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Verify zero-dependency CLI
        run: |
          node bin/oh-my-loop.mjs help
          npm run check
          npm test
          npm pack --dry-run

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Unit tests
        working-directory: reference-implementations/python
        run: python -m unittest -v test_oh_my_loop.py
      - name: Compile
        run: python -m compileall -q reference-implementations/python

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: reference-implementations/typescript/package-lock.json
      - name: Install
        working-directory: reference-implementations/typescript
        run: npm ci
      - name: Build and test
        working-directory: reference-implementations/typescript
        run: npm test
